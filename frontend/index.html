<!DOCTYPE html>
<html>
<head>
  <title>AI Agent (State Machine)</title>
</head>

<body>

<h2>AI Blog Agent (Controlled State Machine)</h2>

<br>

<div id="chat" style="border:1px solid black; height:300px; overflow:auto; padding:10px;"></div>

<br>

<input id="input" placeholder="Type message..." />
<button onclick="send()">Send</button>

<script>

async function send() {
  let input = document.getElementById("input").value;

  if (!input) return;

  addMessage("You: " + input);

  let res = await fetch("http://localhost:8000/agent", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      message: input
    })
  });

  let data = await res.json();
  addMessage("Bot: " + data.reply);

  document.getElementById("input").value = "";
}

function addMessage(msg) {
  let chat = document.getElementById("chat");
  chat.innerHTML += "<p>" + msg + "</p>";
  chat.scrollTop = chat.scrollHeight;
}

</script>

</body>
</html>
